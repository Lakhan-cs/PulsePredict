<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Attack Risk Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='lpk_input.css') }}">
</head>
<body>
    <header class="project-header">
        <div class="header-content">
            <h1>VAC Digital Empowerment</h1>
            <p class="topic">Topic: Healthcare & Nutrition | Term End Project</p>
            <div class="team-members">
                <span><strong>Lakhan</strong> (CS/25/148)</span> • 
                <span><strong>Kartik</strong> (CS/25/147)</span> • 
                <span><strong>Prakhar</strong> (CS/25/155)</span>
            </div>
        </div>
    </header>
    
    <div class="container">
        <h2>Heart Attack Risk Prediction</h2>

        <form action="/predict" method="post" autocomplete="on" return validateForm()>

            <!-- Age -->
            <div class="form-member">
                <label for="Age">Age:</label>
                <input type="number" id="Age" name="Age" min="0" max="100" placeholder="e.g. 20-40" autocomplete="on" required>
            </div>

            <!-- Sex -->
            <div class="form-member">
                <label for="Sex">Gender:</label>
                <select id="Sex" name="Sex" autocomplete="on" required>
                    <option value="" disabled selected>Select Gender</option>
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>

            <!-- Chest Pain -->
            <div class="form-member">
                <label for="Chest_Pain_Type">Chest Pain Type:</label>
                <select id="Chest_Pain_Type" name="Chest_Pain_Type" autocomplete="on" required>
                    <option value="" disabled selected>Select</option>
                    <option value="0">High</option>
                    <option value="1">Middium</option>
                    <option value="2">Low</option>
                    <option value="3">No pain</option>
                </select>
            </div>

            <!-- Blood Pressure -->
            <div class="form-member">
                <label for="Resting_Blood_Pressure">Resting High BP (mmHg):</label>
                <input type="number" id="Resting_Blood_Pressure" name="Resting_Blood_Pressure"
                    min="70" max="180" placeholder="e.g. 90-120" autocomplete="on" required>
            </div>

            <!-- Cholesterol -->
            <div class="form-member">
                <label for="Cholesterol">Cholesterol (mg/dL):</label>
                <input type="number" id="Cholesterol" name="Cholesterol"
                    min="125" max="350" placeholder="e.g. 150-200" autocomplete="on" required>
            </div>

            <!-- Fasting Blood Sugar -->
            <div class="form-member">
                <label for="Fasting_Blood_Sugar">Fasting Blood Sugar:</label>
                <select id="Fasting_Blood_Sugar" name="Fasting_Blood_Sugar" autocomplete="on" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">High (>120 mg/dL)</option>
                    <option value="0">Normal</option>
                </select>
            </div>

            <!-- Max Heart Rate -->
            <div class="form-member">
                <label for="Max_Heart_Rate">Max Heart Rate:</label>
                <input type="number" id="Max_Heart_Rate" name="Max_Heart_Rate"
                    min="100" max="220" placeholder="e.g. 200-150" autocomplete="on" required>
            </div>

            <!-- Smoking -->
            <div class="form-member">
                <label for="Smoking">Smoking:</label>
                <select id="Smoking" name="Smoking" autocomplete="on" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <!-- Alcohol -->
            <div class="form-member">
                <label for="Alcohol_Consumption">Alcohol Consumption:</label>
                <select id="Alcohol_Consumption" name="Alcohol_Consumption" autocomplete="on" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <!-- BMI -->
            <div class="form-member">
                <label for="BMI">BMI (Body Mass Index):</label>
                <select id="BMI" name="BMI" autocomplete="on" required>
                    <option value="" disabled selected>Select</option>
                    <option value="17">Underweight (BMI &lt; 18)</option>
                    <option value="22">Normal (18 ≤ BMI &lt; 25)</option>
                    <option value="27">Overweight (25 ≤ BMI &lt; 30)</option>
                    <option value="32">Obese (BMI ≥ 30)</option>
                </select>
            </div>

            <!-- Stress -->
            <div class="form-member">
                <label for="Stress_Level">Stress Level (1-10):</label>
                <input type="number" id="Stress_Level" name="Stress_Level"
                    min="1" max="10" placeholder="e.g. 1-6" autocomplete="on" required>
            </div>

            <!-- Family History -->
            <div class="form-member">
                <label for="Family_History">Family History:</label>
                <select id="Family_History" name="Family_History" autocomplete="on" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <!-- Diabetes -->
            <div class="form-member">
                <label for="Diabetes">Diabetes:</label>
                <select id="Diabetes" name="Diabetes" autocomplete="on" required>
                    <option value="" disabled selected>Select</option>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <!-- Physical Activity -->
            <div class="form-member">
                <label for="Physical_Activity">Physical Activity (days/week):</label>
                <input type="number" id="Physical_Activity" name="Physical_Activity"
                    min="0" max="7" placeholder="e.g. 3" autocomplete="on" required>
            </div>


            <button type="submit" class="btn btn-primary btn-block">Predict</button>
        </form>
    </div>
    <script>
        function validateForm() {
            // Add custom validation if needed
            return true;
        }
    </script>
    
</body>
</html>
